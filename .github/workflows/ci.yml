name: ecma335 CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  spec:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install shards dependencies
        run: shards install

      - name: Fetch pinned WinMD fixture
        shell: pwsh
        run: ./scripts/fetch-winmd.ps1

      - name: Run specs
        run: crystal spec --error-trace
